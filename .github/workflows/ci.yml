name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Typecheck · Lint · Unit tests · Build
    runs-on: ubuntu-latest
    env:
      # Dummy values so the production build (which never connects — DB pages are force-dynamic)
      # has the env vars present.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
      DIRECT_URL: postgresql://user:pass@localhost:5432/db?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate Next types
        run: npx next typegen
      - run: npm run typecheck
      - run: npm run lint
      - name: Unit tests (pricing engine — no DB)
        run: npm test
      - name: Verify production build compiles
        run: npm run build

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: monetizely_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/monetizely_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/monetizely_test?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run end-to-end test (builds + starts the app)
        run: npm run test:e2e
